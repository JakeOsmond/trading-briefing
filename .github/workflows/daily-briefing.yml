name: Daily Trading Briefing

on:
  schedule:
    # Probe every 10 minutes from 04:00-09:59 UTC. The workflow itself gates
    # execution to 05:00-09:00 Europe/London so the same config works across
    # BST/GMT without manual cron rewrites.
    - cron: "*/10 4-9 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Override date (YYYY-MM-DD). Leave empty for today."
        required: false
        type: string

concurrency:
  group: briefing
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Gate schedule to 05:00-09:00 Europe/London
        id: local_window
        if: github.event_name == 'schedule'
        run: |
          python3 <<'PY'
          import os
          from datetime import datetime, time
          from zoneinfo import ZoneInfo

          now = datetime.now(ZoneInfo("Europe/London"))
          allowed = time(5, 0) <= now.time() <= time(9, 0)
          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"allowed={'true' if allowed else 'false'}\n")
              fh.write(f"local_now={now.isoformat()}\n")
          print(f"Local time: {now.isoformat()} | allowed={allowed}")
          PY

      - name: Skip outside local run window
        if: github.event_name == 'schedule' && steps.local_window.outputs.allowed != 'true'
        run: |
          echo "Skipping scheduled probe outside the 05:00-09:00 Europe/London window."
          exit 0

      - name: Skip if another run already started today
        id: run_guard
        if: github.event_name == 'schedule' && steps.local_window.outputs.allowed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          python3 <<'PY'
          import json
          import os
          import subprocess
          from datetime import datetime
          from zoneinfo import ZoneInfo

          repo = os.environ["GITHUB_REPOSITORY"]
          current_run_id = os.environ["GITHUB_RUN_ID"]
          response = subprocess.check_output(
              [
                  "gh",
                  "api",
                  f"repos/{repo}/actions/workflows/daily-briefing.yml/runs?branch=main&event=schedule&per_page=50",
              ],
              text=True,
          )
          runs = json.loads(response).get("workflow_runs", [])
          london = ZoneInfo("Europe/London")
          today = datetime.now(london).date()
          statuses_to_block = {"queued", "in_progress", "waiting", "requested", "pending"}

          should_skip = False
          reason = "none"
          for run in runs:
              run_id = str(run.get("id"))
              if run_id == current_run_id:
                  continue
              created_at = datetime.fromisoformat(run["created_at"].replace("Z", "+00:00")).astimezone(london)
              if created_at.date() != today:
                  continue
              if run.get("status") in statuses_to_block:
                  should_skip = True
                  reason = f"Earlier run {run_id} is already {run.get('status')}"
                  break
              if run.get("conclusion") == "success":
                  should_skip = True
                  reason = f"Earlier run {run_id} already succeeded today"
                  break

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"skip={'true' if should_skip else 'false'}\n")
              fh.write(f"reason={reason}\n")

          print(reason)
          PY

      - name: Stop because an earlier run already started today
        if: github.event_name == 'schedule' && steps.run_guard.outputs.skip == 'true'
        run: |
          echo "${{ steps.run_guard.outputs.reason }}"
          exit 0

      - name: Install dependencies
        if: github.event_name != 'schedule' || (steps.local_window.outputs.allowed == 'true' && steps.run_guard.outputs.skip != 'true')
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Write GCP credentials file
        if: github.event_name != 'schedule' || (steps.local_window.outputs.allowed == 'true' && steps.run_guard.outputs.skip != 'true')
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > /tmp/gcp-key.json
          python3 -c "import json; c=json.load(open('/tmp/gcp-key.json')); print(f'Credential type: {c.get(\"type\",\"unknown\")}'); print(f'Account: {c.get(\"client_email\", c.get(\"account\", \"authorized_user\"))}')"

      - name: Probe data readiness
        id: readiness
        if: github.event_name == 'schedule' && steps.local_window.outputs.allowed == 'true' && steps.run_guard.outputs.skip != 'true'
        run: |
          set +e
          GOOGLE_APPLICATION_CREDENTIALS=/tmp/gcp-key.json python agentic_briefing.py --preflight-readiness
          status=$?
          set -e
          if [ "$status" -eq 0 ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$status" -eq 3 ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Readiness gate not yet met. Exiting cleanly."
            exit 0
          fi
          exit "$status"

      - name: Run tests
        if: github.event_name != 'schedule' || steps.readiness.outputs.ready == 'true'
        run: python -m pytest tests/test_pipeline.py -v

      - name: Validate template JS syntax
        if: github.event_name != 'schedule' || steps.readiness.outputs.ready == 'true'
        run: |
          node --check templates/dashboard.js
          node --check templates/dashboard-verify.js

      - name: Lint template JS
        if: github.event_name != 'schedule' || steps.readiness.outputs.ready == 'true'
        run: npx eslint@8 templates/dashboard.js templates/dashboard-verify.js --no-eslintrc -c templates/.eslintrc.json --max-warnings 5

      - name: Fetch pending context from KV
        if: github.event_name != 'schedule' || steps.readiness.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          KV_NS="45353e04656c415fa471dfc8e70260f7"
          echo "Fetching pending context from KV namespace $KV_NS..."

          # Use Python + Cloudflare REST API (more reliable than wrangler for KV reads)
          python3 << 'KVFETCH'
          import urllib.request, json, os

          account_id = os.environ.get("CLOUDFLARE_ACCOUNT_ID", "")
          api_token = os.environ.get("CLOUDFLARE_API_TOKEN", "")
          ns_id = "45353e04656c415fa471dfc8e70260f7"

          if not account_id or not api_token:
              print("ERROR: Missing CLOUDFLARE_ACCOUNT_ID or CLOUDFLARE_API_TOKEN")
              json.dump([], open("context/operational/context-additions.json", "w"))
              json.dump([], open("context/operational/context-removals.json", "w"))
              exit(0)

          base = f"https://api.cloudflare.com/client/v4/accounts/{account_id}/storage/kv/namespaces/{ns_id}"
          headers = {"Authorization": f"Bearer {api_token}", "Content-Type": "application/json"}

          def kv_list(prefix):
              try:
                  url = f"{base}/keys?prefix={prefix}"
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      data = json.loads(resp.read().decode())
                  if not data.get("success"):
                      print(f"  KV list error for {prefix}: {data.get('errors', 'unknown')}")
                      return []
                  return [k["name"] for k in data.get("result", [])]
              except Exception as e:
                  print(f"  KV list failed for {prefix}: {e}")
                  return []

          def kv_get(key):
              try:
                  url = f"{base}/values/{urllib.parse.quote(key, safe='')}"
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      return json.loads(resp.read().decode())
              except Exception as e:
                  print(f"  KV get failed for {key}: {e}")
                  return None

          def kv_delete(key):
              try:
                  url = f"{base}/values/{urllib.parse.quote(key, safe='')}"
                  req = urllib.request.Request(url, headers=headers, method="DELETE")
                  urllib.request.urlopen(req, timeout=10)
              except Exception as e:
                  print(f"  KV delete failed for {key}: {e}")

          # Fetch adds
          adds = []
          for key in kv_list("context_add:"):
              val = kv_get(key)
              if val:
                  adds.append(val)
                  kv_delete(key)
                  print(f"  Consumed add: {key}")

          # Fetch removals
          removals = []
          for key in kv_list("context_removal:"):
              val = kv_get(key)
              if val:
                  removals.append(val)
                  kv_delete(key)
                  print(f"  Consumed removal: {key}")

          os.makedirs("context/operational", exist_ok=True)
          json.dump(adds, open("context/operational/context-additions.json", "w"))
          json.dump(removals, open("context/operational/context-removals.json", "w"))
          print(f"Adds: {len(adds)}, Removals: {len(removals)}")
          KVFETCH

      - name: Run briefing script
        if: github.event_name != 'schedule' || steps.readiness.outputs.ready == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
          CI: "true"
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python agentic_briefing.py --date "${{ github.event.inputs.date }}"
          else
            python agentic_briefing.py
          fi

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/gcp-key.json

      - name: Commit and push briefing
        if: github.event_name != 'schedule' || steps.readiness.outputs.ready == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefings/*.html briefings/*.md briefings/archive.json briefings/*.png calibration.jsonl context/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "Briefing: ${DATE}

          Co-Authored-By: Trading Covered Bot <noreply@holidayextras.com>"
          # Pull remote changes — if rebase conflicts on generated files, resolve automatically
          if ! git pull --rebase origin main; then
            echo "⚠ Rebase conflict — auto-resolving generated files with this run's version"
            # In a rebase, --ours = the commit being rebased (our new briefing)
            git checkout --ours calibration.jsonl context/operational/temporary-context.md context/operational/pending-context.md 2>/dev/null || true
            git add calibration.jsonl context/operational/temporary-context.md context/operational/pending-context.md 2>/dev/null || true
            # Also resolve any briefing file conflicts with ours
            git diff --name-only --diff-filter=U | xargs -I{} git checkout --ours {} 2>/dev/null || true
            git diff --name-only --diff-filter=U | xargs -I{} git add {} 2>/dev/null || true
            GIT_EDITOR=true git rebase --continue || {
              echo "⚠ Rebase continue failed — aborting and using merge instead"
              git rebase --abort
              git pull --no-rebase -X ours origin main
            }
          fi
          git push

      - name: Inject schema/business context into ask.js
        if: github.event_name != 'schedule' || steps.readiness.outputs.ready == 'true'
        run: bash scripts/inject-ask-context.sh insurance

      - name: Stage deployment (briefings + functions)
        if: github.event_name != 'schedule' || steps.readiness.outputs.ready == 'true'
        run: |
          test -f functions/api/_generated-context.js || { echo "ERROR: _generated-context.js missing — run inject-ask-context.sh first"; exit 1; }
          mkdir -p _deploy
          cp -r briefings/* _deploy/
          cp -r functions _deploy/functions

      - name: Set Pages runtime secrets
        if: github.event_name != 'schedule' || steps.readiness.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.OPENAI_API_KEY }}" | npx wrangler pages secret put OPENAI_API_KEY --project-name trading-covered 2>/dev/null || true
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' | npx wrangler pages secret put GCP_SERVICE_ACCOUNT_KEY --project-name trading-covered 2>/dev/null || true
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | npx wrangler pages secret put ANTHROPIC_API_KEY --project-name trading-covered 2>/dev/null || true
          echo "${{ secrets.VERIFY_PASSWORD }}" | npx wrangler pages secret put VERIFY_PASSWORD --project-name trading-covered 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        if: github.event_name != 'schedule' || steps.readiness.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy _deploy --project-name trading-covered --commit-dirty=true

      - name: Sync staging branch to main
        if: github.event_name != 'schedule' || steps.readiness.outputs.ready == 'true'
        run: |
          git fetch origin staging 2>/dev/null || true
          git push origin HEAD:staging --force

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::Trading Covered pipeline failed! Check the logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "Pipeline failed at $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "Trigger: ${{ github.event_name }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
