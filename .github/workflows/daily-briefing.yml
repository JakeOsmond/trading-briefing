name: Daily Trading Briefing

on:
  schedule:
    # 05:00 UTC = 06:00 BST (UK summer), 05:00 GMT (UK winter). Mon-Fri.
    - cron: "0 5 * * 1-5"
  workflow_dispatch:
    inputs:
      date:
        description: "Override date (YYYY-MM-DD). Leave empty for today."
        required: false
        type: string

concurrency:
  group: briefing
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  generate-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/test_pipeline.py -v

      - name: Validate template JS syntax
        run: |
          node --check templates/dashboard.js
          node --check templates/dashboard-verify.js

      - name: Lint template JS
        run: npx eslint@8 templates/dashboard.js templates/dashboard-verify.js --no-eslintrc -c templates/.eslintrc.json --max-warnings 5

      - name: Write GCP credentials file
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' > /tmp/gcp-key.json
          python3 -c "import json; c=json.load(open('/tmp/gcp-key.json')); print(f'Credential type: {c.get(\"type\",\"unknown\")}'); print(f'Account: {c.get(\"client_email\", c.get(\"account\", \"authorized_user\"))}')"

      - name: Fetch pending context from KV
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          KV_NS="45353e04656c415fa471dfc8e70260f7"
          echo "Fetching pending context from KV namespace $KV_NS..."

          # Use Python + Cloudflare REST API (more reliable than wrangler for KV reads)
          python3 << 'KVFETCH'
          import urllib.request, json, os

          account_id = os.environ.get("CLOUDFLARE_ACCOUNT_ID", "")
          api_token = os.environ.get("CLOUDFLARE_API_TOKEN", "")
          ns_id = "45353e04656c415fa471dfc8e70260f7"

          if not account_id or not api_token:
              print("ERROR: Missing CLOUDFLARE_ACCOUNT_ID or CLOUDFLARE_API_TOKEN")
              json.dump([], open("context/operational/context-additions.json", "w"))
              json.dump([], open("context/operational/context-removals.json", "w"))
              exit(0)

          base = f"https://api.cloudflare.com/client/v4/accounts/{account_id}/storage/kv/namespaces/{ns_id}"
          headers = {"Authorization": f"Bearer {api_token}", "Content-Type": "application/json"}

          def kv_list(prefix):
              try:
                  url = f"{base}/keys?prefix={prefix}"
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=15) as resp:
                      data = json.loads(resp.read().decode())
                  if not data.get("success"):
                      print(f"  KV list error for {prefix}: {data.get('errors', 'unknown')}")
                      return []
                  return [k["name"] for k in data.get("result", [])]
              except Exception as e:
                  print(f"  KV list failed for {prefix}: {e}")
                  return []

          def kv_get(key):
              try:
                  url = f"{base}/values/{urllib.parse.quote(key, safe='')}"
                  req = urllib.request.Request(url, headers=headers)
                  with urllib.request.urlopen(req, timeout=10) as resp:
                      return json.loads(resp.read().decode())
              except Exception as e:
                  print(f"  KV get failed for {key}: {e}")
                  return None

          def kv_delete(key):
              try:
                  url = f"{base}/values/{urllib.parse.quote(key, safe='')}"
                  req = urllib.request.Request(url, headers=headers, method="DELETE")
                  urllib.request.urlopen(req, timeout=10)
              except Exception as e:
                  print(f"  KV delete failed for {key}: {e}")

          # Fetch adds
          adds = []
          for key in kv_list("context_add:"):
              val = kv_get(key)
              if val:
                  adds.append(val)
                  kv_delete(key)
                  print(f"  Consumed add: {key}")

          # Fetch removals
          removals = []
          for key in kv_list("context_removal:"):
              val = kv_get(key)
              if val:
                  removals.append(val)
                  kv_delete(key)
                  print(f"  Consumed removal: {key}")

          os.makedirs("context/operational", exist_ok=True)
          json.dump(adds, open("context/operational/context-additions.json", "w"))
          json.dump(removals, open("context/operational/context-removals.json", "w"))
          print(f"Adds: {len(adds)}, Removals: {len(removals)}")
          KVFETCH

      - name: Run briefing script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
          CI: "true"
        run: |
          if [ -n "${{ github.event.inputs.date }}" ]; then
            python agentic_briefing.py --date "${{ github.event.inputs.date }}"
          else
            python agentic_briefing.py
          fi

      - name: Clean up credentials
        if: always()
        run: rm -f /tmp/gcp-key.json

      - name: Commit and push briefing
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add briefings/*.html briefings/*.md briefings/archive.json briefings/*.png calibration.jsonl context/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "Briefing: ${DATE}

          Co-Authored-By: Trading Covered Bot <noreply@holidayextras.com>"
          git pull --rebase origin main
          git push

      - name: Inject schema/business context into ask.js
        run: bash scripts/inject-ask-context.sh insurance

      - name: Stage deployment (briefings + functions)
        run: |
          test -f functions/api/_generated-context.js || { echo "ERROR: _generated-context.js missing — run inject-ask-context.sh first"; exit 1; }
          mkdir -p _deploy
          cp -r briefings/* _deploy/
          cp -r functions _deploy/functions

      - name: Set Pages runtime secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "${{ secrets.OPENAI_API_KEY }}" | npx wrangler pages secret put OPENAI_API_KEY --project-name trading-covered 2>/dev/null || true
          echo '${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}' | npx wrangler pages secret put GCP_SERVICE_ACCOUNT_KEY --project-name trading-covered 2>/dev/null || true
          echo "${{ secrets.ANTHROPIC_API_KEY }}" | npx wrangler pages secret put ANTHROPIC_API_KEY --project-name trading-covered 2>/dev/null || true
          echo "${{ secrets.VERIFY_PASSWORD }}" | npx wrangler pages secret put VERIFY_PASSWORD --project-name trading-covered 2>/dev/null || true

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy _deploy --project-name trading-covered --commit-dirty=true

      - name: Sync staging branch to main
        run: |
          git fetch origin staging 2>/dev/null || true
          git push origin HEAD:staging --force

      - name: Alert on failure
        if: failure()
        run: |
          echo "::error::Trading Covered pipeline failed! Check the logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo ""
          echo "Pipeline failed at $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "Trigger: ${{ github.event_name }}"
          echo "Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
