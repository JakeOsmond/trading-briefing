name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - 'briefings/**'
      - 'templates/**'
      - 'agentic_briefing.py'
      - '.github/workflows/deploy-production.yml'
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate template JS syntax
        run: |
          node --check templates/dashboard.js
          node --check templates/dashboard-verify.js

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml markdown

      - name: Regenerate context manager page
        run: python3 -c "import sys; sys.path.insert(0,'.'); from agentic_briefing import generate_context_manager_html; open('briefings/context-manager.html','w').write(generate_context_manager_html()); print('Context manager regenerated')"

      - name: Inject schema/business context into ask.js
        run: bash scripts/inject-ask-context.sh insurance

      - name: Stage deployment (briefings + functions)
        run: |
          test -f functions/api/_generated-context.js || { echo "ERROR: _generated-context.js missing"; exit 1; }
          mkdir -p _deploy
          cp -r briefings/* _deploy/
          cp -r functions _deploy/functions

      - name: Deploy to Cloudflare Pages (production)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy _deploy --project-name trading-covered --commit-dirty=true
