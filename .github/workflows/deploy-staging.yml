name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject schema/business context into ask.js
        run: bash scripts/inject-ask-context.sh insurance

      - name: Stage deployment (briefings + functions)
        run: |
          test -f functions/api/_generated-context.js || { echo "ERROR: _generated-context.js missing"; exit 1; }
          mkdir -p _deploy
          cp -r briefings/* _deploy/
          cp -r functions _deploy/functions

      - name: Deploy to Cloudflare Pages (staging branch preview)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy _deploy --project-name trading-covered --branch staging --commit-dirty=true
